<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eval Map - Detections vs Ground Truth (with VLM)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; }
#map { width: 100%; height: 100vh; }
.legend { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #eee; padding: 12px 16px; border-radius: 6px; z-index: 1000; font-size: 13px; }
.legend div { margin: 3px 0; display: flex; align-items: center; gap: 8px; }
.legend .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid #fff; }
#stats { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: #eee; padding: 12px 16px; border-radius: 6px; z-index: 1000; font-size: 13px; max-width: 420px; }
#controls { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); color: #eee; padding: 12px 16px; border-radius: 6px; z-index: 1000; font-size: 13px; }
#controls label { display: block; margin: 4px 0; cursor: pointer; }
#controls select, #controls input { margin: 4px 0; }
.sidebar { position: absolute; right: 20px; top: 200px; bottom: 20px; width: 320px; background: rgba(0,0,0,0.85); color: #eee; border-radius: 6px; z-index: 1000; overflow-y: auto; padding: 8px; font-size: 12px; display: none; }
.sidebar img { width: 100%; border-radius: 4px; margin: 4px 0; }
</style>
</head>
<body>
<div id="map"></div>
<div id="stats"></div>
<div id="controls">
  <strong>Filters</strong>
  <label>Match radius: <select id="matchRadius">
    <option value="10">10m</option>
    <option value="15">15m</option>
    <option value="20" selected>20m</option>
    <option value="30">30m</option>
  </select></label>
  <label>GDino conf >= <input type="range" id="gdinoTh" min="0.10" max="0.50" step="0.01" value="0.15">
    <span id="gdinoThVal">0.15</span></label>
  <label>VLM conf >= <input type="range" id="vlmTh" min="0.0" max="1.0" step="0.05" value="0.70">
    <span id="vlmThVal">0.70</span></label>
  <label><input type="checkbox" id="showVlmPoleOnly" checked> VLM poles only</label>
  <label><input type="checkbox" id="showRejected"> Show VLM-rejected</label>
  <label><input type="checkbox" id="showMatchLines" checked> Show match lines</label>
  <div id="filterStats" style="margin-top:8px; font-size:11px; color:#aaa;"></div>
</div>
<div class="legend" id="legend"></div>
<div class="sidebar" id="sidebar"></div>

<script>
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
// EagleView ortho tiles — multiple zoom levels
[19, 20, 21, 22, 23].forEach(z => {
  L.tileLayer(`data/wmts/${z}_{x}_{y}.png`, {
    minZoom: z, maxZoom: 23, maxNativeZoom: z, minNativeZoom: z,
    tileSize: 256, errorTileUrl: ''
  }).addTo(map);
});

const VLM_COLORS = {
  pole: '#00aaff',
  streetlight: '#ffd60a',
  fence: '#ff8800',
  tree: '#44cc44',
  building_edge: '#cc44cc',
  other: '#888888',
  unknown: '#ff4444',
};

let gtPoles = [], gtLights = [], allDets = [], vlmLookup = {};
let markers = [], lines = [];

async function load() {
  const [gtResp, evalResp, vlmResp] = await Promise.all([
    fetch('data/ground_truth_testarea.json?t=' + Date.now()),
    fetch('data/eval_testarea/eval_results.json'),
    fetch('data/eval_testarea/classifications_qwen3.5:27b.json').catch(() => null),
  ]);
  const gt = await gtResp.json();
  const evalData = await evalResp.json();
  const vlmData = vlmResp ? await vlmResp.json() : null;

  gtPoles = gt.labels.filter(l => l.label === 'pole');
  gtLights = gt.labels.filter(l => l.label === 'streetlight');

  // Merge VLM classifications into detections
  if (vlmData) {
    vlmData.classifications.forEach(c => {
      const key = `${c.cell}_${c.source_view}_${c.bbox.join(',')}`;
      vlmLookup[key] = c;
    });
  }

  allDets = evalData.detections.map(d => {
    const key = `${d.cell}_${d.source_view}_${d.bbox.join(',')}`;
    const vlm = vlmLookup[key] || {};
    return { ...d, vlm_class: vlm.vlm_class || 'unknown', vlm_confidence: vlm.vlm_confidence || 0 };
  });

  // Fit map
  const lats = [...gtPoles.map(l => l.lat), ...allDets.map(d => d.approx_lat)];
  const lons = [...gtPoles.map(l => l.lon), ...allDets.map(d => d.approx_lon)];
  map.fitBounds([[Math.min(...lats)-0.0005, Math.min(...lons)-0.0005],
                  [Math.max(...lats)+0.0005, Math.max(...lons)+0.0005]]);

  // Draw GT (always visible) — distinguish manual vs auto-detected
  let autoIdx = 0;
  gtPoles.forEach((l, i) => {
    const isAuto = l.source === 'auto_detected';
    const marker = L.circleMarker([l.lat, l.lon], {
      radius: isAuto ? 9 : 8,
      fillColor: isAuto ? '#00ccff' : '#00ff88',
      color: isAuto ? '#ff0' : '#fff',
      weight: isAuto ? 2.5 : 2,
      fillOpacity: isAuto ? 0.6 : 0.8,
      dashArray: isAuto ? '4,3' : null,
    }).addTo(map);
    if (isAuto) {
      // Show crop image in popup for auto-detected poles
      const cropIdx = autoIdx++;
      const popupContent = `
        <div style="text-align:center; max-width:300px;">
          <strong>Auto Pole #${cropIdx+1} — NEEDS REVIEW</strong><br>
          <img src="data/eval_testarea/fp_inspect/fp_${String(l._fpIdx).padStart(2,'0')}_${l.cell}_${l.view}.jpg"
               style="max-width:280px; max-height:280px; margin:4px 0; border:2px solid #ff0; border-radius:4px;"
               onerror="this.style.display='none'"><br>
          <span style="font-size:11px;">
            GDino: ${l.gdino_conf} | VLM: ${l.vlm_conf}<br>
            Cell: ${l.cell} | View: ${l.view}<br>
            (${l.lat.toFixed(6)}, ${l.lon.toFixed(6)})
          </span>
        </div>`;
      marker.bindPopup(popupContent, {maxWidth: 320});
      marker.bindTooltip(`Auto Pole — click to see crop`);
    } else {
      marker.bindTooltip(`GT Pole #${i+1} (manual)<br>(${l.lat.toFixed(6)}, ${l.lon.toFixed(6)})`);
    }
  });
  gtLights.forEach((l, i) => {
    L.circleMarker([l.lat, l.lon], {
      radius: 7, fillColor: '#ffd60a', color: '#fff', weight: 2, fillOpacity: 0.7
    }).addTo(map).bindTooltip(`GT Streetlight #${i+1}`);
  });

  render();

  // Control listeners
  ['matchRadius', 'gdinoTh', 'vlmTh', 'showVlmPoleOnly', 'showRejected', 'showMatchLines'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
    document.getElementById(id).addEventListener('input', () => {
      if (id === 'gdinoTh') document.getElementById('gdinoThVal').textContent = document.getElementById('gdinoTh').value;
      if (id === 'vlmTh') document.getElementById('vlmThVal').textContent = document.getElementById('vlmTh').value;
    });
  });
}

function render() {
  // Clear old markers
  markers.forEach(m => map.removeLayer(m));
  lines.forEach(l => map.removeLayer(l));
  markers = []; lines = [];

  const matchRadius = parseInt(document.getElementById('matchRadius').value);
  const gdinoTh = parseFloat(document.getElementById('gdinoTh').value);
  const vlmTh = parseFloat(document.getElementById('vlmTh').value);
  const poleOnly = document.getElementById('showVlmPoleOnly').checked;
  const showRejected = document.getElementById('showRejected').checked;
  const showLines = document.getElementById('showMatchLines').checked;

  document.getElementById('gdinoThVal').textContent = gdinoTh.toFixed(2);
  document.getElementById('vlmThVal').textContent = vlmTh.toFixed(2);

  // Filter detections
  let dets = allDets.filter(d => d.conf >= gdinoTh);
  let rejected = [];
  if (poleOnly) {
    rejected = dets.filter(d => d.vlm_class !== 'pole' || d.vlm_confidence < vlmTh);
    dets = dets.filter(d => d.vlm_class === 'pole' && d.vlm_confidence >= vlmTh);
  }

  // Match to GT
  const matched = new Set();
  dets.forEach(det => {
    let bestDist = Infinity, bestIdx = -1;
    gtPoles.forEach((gt, i) => {
      const dlat = (det.approx_lat - gt.lat) * 111320;
      const dlon = (det.approx_lon - gt.lon) * 111320 * Math.cos(41.249 * Math.PI / 180);
      const dist = Math.sqrt(dlat*dlat + dlon*dlon);
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    });
    det._matchDist = bestDist;
    det._matched = bestDist <= matchRadius && !matched.has(bestIdx);
    det._matchedGtIdx = det._matched ? bestIdx : -1;
    if (det._matched) matched.add(bestIdx);
  });

  // Draw match lines
  if (showLines) {
    dets.filter(d => d._matched).forEach(det => {
      const gt = gtPoles[det._matchedGtIdx];
      const line = L.polyline([[det.approx_lat, det.approx_lon], [gt.lat, gt.lon]], {
        color: '#00ffff', weight: 1.5, dashArray: '4,4', opacity: 0.7
      }).addTo(map);
      lines.push(line);
    });
  }

  // Draw rejected detections (dimmed)
  if (showRejected) {
    rejected.forEach(det => {
      const color = VLM_COLORS[det.vlm_class] || '#888';
      const m = L.circleMarker([det.approx_lat, det.approx_lon], {
        radius: 4, fillColor: color, color: '#333', weight: 1, fillOpacity: 0.3
      }).addTo(map).bindTooltip(
        `REJECTED: ${det.vlm_class} (${(det.vlm_confidence*100).toFixed(0)}%)<br>` +
        `[${det.source_view}] conf=${det.conf} h=${det.est_height}m`
      );
      markers.push(m);
    });
  }

  // Draw accepted detections
  dets.forEach((det, i) => {
    const isTP = det._matched;
    const color = isTP ? '#00ffff' : '#ff4444';
    const radius = isTP ? 6 : 5;
    const m = L.circleMarker([det.approx_lat, det.approx_lon], {
      radius, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.9
    }).addTo(map).bindTooltip(
      `Det #${i+1} [${det.source_view}] ${det.cell}<br>` +
      `VLM: ${det.vlm_class} (${(det.vlm_confidence*100).toFixed(0)}%)<br>` +
      `GDino conf: ${det.conf} | h=${det.est_height}m | ${det.num_views}v<br>` +
      `Nearest GT: ${det._matchDist.toFixed(1)}m<br>` +
      `<strong>${isTP ? 'TRUE POSITIVE' : 'FALSE POSITIVE'}</strong>`
    );
    markers.push(m);
  });

  // Highlight unmatched GT poles (FN)
  gtPoles.forEach((gt, i) => {
    if (!matched.has(i)) {
      const m = L.circleMarker([gt.lat, gt.lon], {
        radius: 12, fillColor: 'transparent', color: '#ff0000', weight: 2, fillOpacity: 0,
        dashArray: '4,4'
      }).addTo(map).bindTooltip(`MISSED: GT Pole #${i+1}`);
      markers.push(m);
    }
  });

  // Stats
  const tp = dets.filter(d => d._matched).length;
  const fp = dets.length - tp;
  const fn = gtPoles.length - tp;
  const p = tp / (tp + fp) || 0;
  const r = tp / (tp + fn) || 0;
  const f1 = 2*p*r / (p+r) || 0;
  document.getElementById('stats').innerHTML = `
    <strong>Eval at ${matchRadius}m</strong><br>
    GT: ${gtPoles.length} poles, ${gtLights.length} streetlights<br>
    Detections: ${dets.length} (${rejected.length} rejected by VLM)<br>
    <span style="color:#00ffff">TP: ${tp}</span> |
    <span style="color:#ff4444">FP: ${fp}</span> |
    <span style="color:#ff0000">FN: ${fn}</span><br>
    <strong>P: ${(p*100).toFixed(1)}% | R: ${(r*100).toFixed(1)}% | F1: ${f1.toFixed(3)}</strong>
  `;

  // Legend
  document.getElementById('legend').innerHTML = `
    <div><span class="dot" style="background:#00ff88;"></span> GT Pole — manual (${gtPoles.filter(l=>!l.source).length})</div>
    <div><span class="dot" style="background:#00ccff; border:2px solid #ff0;"></span> GT Pole — auto, needs review (${gtPoles.filter(l=>l.source==='auto_detected').length})</div>
    <div><span class="dot" style="background:#ffd60a;"></span> GT Streetlight (${gtLights.length})</div>
    <div><span class="dot" style="background:#00ffff;"></span> Detection (TP)</div>
    <div><span class="dot" style="background:#ff4444;"></span> Detection (FP)</div>
    <div><span class="dot" style="background:transparent; border:2px dashed #ff0000;"></span> Missed pole (FN)</div>
    ${showRejected ? '<div style="margin-top:6px; font-size:11px;">VLM-rejected (dimmed):</div>' +
      Object.entries(VLM_COLORS).filter(([k]) => k !== 'unknown').map(([k,v]) =>
        `<div><span class="dot" style="background:${v}; opacity:0.4;"></span> ${k}</div>`
      ).join('') : ''}
  `;

  document.getElementById('filterStats').innerHTML =
    `Showing ${dets.length} dets, ${rejected.length} rejected`;
}

load();
</script>
</body>
</html>
