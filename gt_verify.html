<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ground Truth Verification</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #eee; }
#map { flex: 1; }
#sidebar { width: 340px; display: flex; flex-direction: column; background: #16213e; border-left: 1px solid #0f3460; }
#info { padding: 12px; border-bottom: 1px solid #0f3460; font-size: 13px; }
#list { flex: 1; overflow-y: auto; padding: 8px; }
.pole-item { padding: 8px; margin: 4px 0; background: #1a1a2e; border-radius: 4px; cursor: pointer; border: 2px solid transparent; font-size: 12px; }
.pole-item:hover { border-color: #0f3460; }
.pole-item.active { border-color: #00ff88; }
.pole-item.flagged { border-color: #ff4444; background: #2a1a1a; }
.pole-item .coords { font-family: monospace; color: #888; font-size: 11px; }
.pole-item .source { color: #ffd60a; font-size: 10px; }
#actions { padding: 8px 12px; border-top: 1px solid #0f3460; }
.btn { padding: 6px 12px; border: 1px solid #0f3460; background: #1a1a2e; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 11px; margin: 2px; }
.btn:hover { border-color: #e94560; color: #eee; }
.btn.danger { color: #ff4444; }
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <div id="info">
    <strong>GT Verification</strong><br>
    <span id="stats">Loading...</span><br>
    <div style="margin-top:6px;font-size:11px;color:#888;">
      Click a pole to zoom in. Check if the green dot is on an actual pole in the ortho imagery.
      Flag any that look wrong.
    </div>
  </div>
  <div id="list"></div>
  <div id="actions">
    <button class="btn" onclick="saveAll()" style="color:#00ff88;">Save GT (S)</button>
    <button class="btn" onclick="exportFlagged()">Export Flagged</button>
    <button class="btn" onclick="zoomNext()">Next (N)</button>
    <button class="btn danger" onclick="flagCurrent()">Flag/Remove (F)</button>
  </div>
</div>

<script>
const map = L.map('map', { maxZoom: 23 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
[19, 20, 21, 22, 23].forEach(z => {
  L.tileLayer(`data/wmts/${z}_{x}_{y}.png`, {
    minZoom: z, maxZoom: 23, maxNativeZoom: z, minNativeZoom: z,
    tileSize: 256, errorTileUrl: ''
  }).addTo(map);
});

let poles = [], markers = [], currentIdx = -1, flagged = new Set();

async function load() {
  const resp = await fetch('data/ground_truth_testarea.json?t=' + Date.now());
  const gt = await resp.json();
  poles = gt.labels.filter(l => l.label === 'pole');

  const list = document.getElementById('list');

  poles.forEach((p, i) => {
    const isAuto = p.source === 'auto_detected';

    // Map marker — draggable
    const marker = L.marker([p.lat, p.lon], {
      draggable: true,
      icon: L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:#00ff88;border:2px solid #fff;margin:-8px 0 0 -8px;cursor:grab;"></div>`,
        iconSize: [0, 0],
      })
    }).addTo(map);
    marker.bindTooltip(`#${i+1} ${isAuto ? '(auto)' : '(manual)'}`);
    marker.on('click', () => selectPole(i));
    marker.on('dragend', () => {
      const pos = marker.getLatLng();
      poles[i].lat = pos.lat;
      poles[i].lon = pos.lng;
      poles[i]._moved = true;
      document.getElementById(`pole-${i}`).querySelector('.coords').textContent =
        `${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)} (MOVED)`;
      document.getElementById(`pole-${i}`).style.borderColor = '#ffd60a';
      updateStats();
    });
    markers.push(marker);

    // Add 10m radius circle to show match area
    L.circle([p.lat, p.lon], { radius: 10, color: '#00ff88', weight: 1, fill: false, opacity: 0.3 }).addTo(map);

    // List item
    const div = document.createElement('div');
    div.className = 'pole-item';
    div.id = `pole-${i}`;
    div.innerHTML = `
      <strong>#${i+1}</strong> ${isAuto ? '<span class="source">AUTO</span>' : '<span class="source" style="color:#00ff88">MANUAL</span>'}
      <div class="coords">${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}</div>
    `;
    div.onclick = () => selectPole(i);
    list.appendChild(div);
  });

  // Draw test area boundary
  const FOCUS_LAT = 41.248644, FOCUS_LON = -95.998878;
  const R_LAT = 0.0018, R_LON = 0.0024;
  L.rectangle([
    [FOCUS_LAT - R_LAT, FOCUS_LON - R_LON],
    [FOCUS_LAT + R_LAT, FOCUS_LON + R_LON]
  ], { color: '#00ff88', weight: 2, fill: false, dashArray: '8,4' }).addTo(map);

  map.fitBounds(poles.map(p => [p.lat, p.lon]), { padding: [50, 50] });

  // Right-click to add new pole
  map.on('contextmenu', (e) => {
    const { lat, lng } = e.latlng;
    const i = poles.length;
    const p = { lat, lon: lng, label: 'pole', source: 'manual_added', _new: true };
    poles.push(p);

    const marker = L.marker([lat, lng], {
      draggable: true,
      icon: L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:#00ff88;border:2px solid #fff;margin:-8px 0 0 -8px;cursor:grab;"></div>`,
        iconSize: [0, 0],
      })
    }).addTo(map);
    marker.bindTooltip(`#${i+1} (NEW)`);
    marker.on('click', () => selectPole(i));
    marker.on('dragend', () => {
      const pos = marker.getLatLng();
      poles[i].lat = pos.lat;
      poles[i].lon = pos.lng;
      document.getElementById(`pole-${i}`).querySelector('.coords').textContent =
        `${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
    });
    markers.push(marker);
    L.circle([lat, lng], { radius: 10, color: '#00ff88', weight: 1, fill: false, opacity: 0.3 }).addTo(map);

    const div = document.createElement('div');
    div.className = 'pole-item';
    div.id = `pole-${i}`;
    div.style.borderColor = '#00ff88';
    div.innerHTML = `
      <strong>#${i+1}</strong> <span class="source" style="color:#00ff88">NEW</span>
      <div class="coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
    `;
    div.onclick = () => selectPole(i);
    document.getElementById('list').appendChild(div);

    selectPole(i);
    updateStats();
  });
  document.getElementById('stats').textContent =
    `${poles.length} poles (${poles.filter(p=>!p.source).length} manual, ${poles.filter(p=>p.source==='auto_detected').length} auto)`;
}

function selectPole(idx) {
  if (currentIdx >= 0) {
    document.getElementById(`pole-${currentIdx}`).classList.remove('active');
    markers[currentIdx].setStyle({ color: '#fff', weight: 2 });
  }
  currentIdx = idx;
  document.getElementById(`pole-${idx}`).classList.add('active');
  document.getElementById(`pole-${idx}`).scrollIntoView({ block: 'center' });
  markers[idx].setStyle({ color: '#ffd60a', weight: 3 });
  map.setView([poles[idx].lat, poles[idx].lon], 21);
}

function zoomNext() {
  selectPole((currentIdx + 1) % poles.length);
}

function flagCurrent() {
  if (currentIdx < 0) return;
  if (flagged.has(currentIdx)) {
    flagged.delete(currentIdx);
    document.getElementById(`pole-${currentIdx}`).classList.remove('flagged');
    markers[currentIdx].setStyle({ fillColor: '#00ff88' });
  } else {
    flagged.add(currentIdx);
    document.getElementById(`pole-${currentIdx}`).classList.add('flagged');
    markers[currentIdx].setStyle({ fillColor: '#ff4444' });
  }
  document.getElementById('stats').textContent =
    `${poles.length} poles | ${flagged.size} flagged`;
}

function updateStats() {
  const moved = poles.filter(p => p._moved).length;
  document.getElementById('stats').textContent =
    `${poles.length} poles | ${flagged.size} flagged | ${moved} moved`;
}

function saveAll() {
  // Build updated GT: remove flagged, update moved positions
  const updated = {
    labels: poles.filter((p, i) => !flagged.has(i)).map(p => {
      const clean = { lat: round6(p.lat), lon: round6(p.lon), label: p.label || 'pole' };
      if (p.source) clean.source = p.source;
      if (p._moved) clean.corrected = true;
      return clean;
    }),
    saved_at: new Date().toISOString(),
    removed: flagged.size,
    moved: poles.filter(p => p._moved).length,
  };
  const blob = new Blob([JSON.stringify(updated, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ground_truth_testarea_verified.json';
  a.click();
  alert(`Saved! ${updated.labels.length} poles (removed ${flagged.size}, moved ${updated.moved})`);
}

function round6(n) { return Math.round(n * 1e6) / 1e6; }

function exportFlagged() {
  const flaggedPoles = [...flagged].map(i => ({
    index: i, lat: poles[i].lat, lon: poles[i].lon,
    source: poles[i].source || 'manual'
  }));
  const blob = new Blob([JSON.stringify(flaggedPoles, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'flagged_gt_poles.json';
  a.click();
}

document.addEventListener('keydown', e => {
  if (e.key === 'n' || e.key === 'N') zoomNext();
  if (e.key === 'f' || e.key === 'F') flagCurrent();
  if (e.key === 's' || e.key === 'S') saveAll();
});

load();
</script>
</body>
</html>
